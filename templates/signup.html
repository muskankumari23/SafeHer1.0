{% extends "base.html" %}

{% block title %}SafeHer - Sign Up{% endblock %}

{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 80px);">
    <div class="auth-card" style="max-width: 500px;">
        <h1>Join SafeHer</h1>
        <p>Create your safety profile</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form action="{{ url_for('signup') }}" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Jane Doe">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required placeholder="+1234567890">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="jane@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Strong Password">
            </div>
            <div class="form-group">
                <label>Emergency Contact 1 (Required)</label>
                <input type="tel" name="contact1" required placeholder="+1987654321">
            </div>
            <div class="form-group">
                <label>Emergency Contact 2 (Optional)</label>
                <input type="tel" name="contact2" placeholder="+1122334455">
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
