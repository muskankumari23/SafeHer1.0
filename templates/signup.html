<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="active">Home</a>
            <a href="#">Partners</a>
            <a href="#">Safety Tips</a>
            <a href="#">Support</a>
        </div>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h2>SafeHer</h2>
        </div>
        <div class="user-profile" style="background: transparent; box-shadow: none;">
            <a href="{{ url_for('login') }}" class="btn" style="padding: 0.5rem 1.5rem;">Login</a>
        </div>
    </nav>
    <div class="auth-container" style="min-height: calc(100vh - 80px);">
        <div class="auth-card" style="max-width: 500px;">
            <h1>Join SafeHer</h1>
            <p>Create your safety profile</p>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="alert alert-success">{{ success }}</div>
            {% endif %}

            <form action="{{ url_for('signup') }}" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Strong Password">
                </div>
                <div class="form-group">
                    <label>Emergency Contact 1 (Required)</label>
                    <input type="tel" name="contact1" required placeholder="+1987654321">
                </div>
                <div class="form-group">
                    <label>Emergency Contact 2 (Optional)</label>
                    <input type="tel" name="contact2" placeholder="+1122334455">
                </div>

                <button type="submit" class="btn">Register</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</body>

</html>
