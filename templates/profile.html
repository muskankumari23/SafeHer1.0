{% extends "base.html" %}

{% block title %}SafeHer - My Profile{% endblock %}

{% block content %}
<div class="dashboard-container" style="max-width: 600px;">
    <div class="card" style="padding: 3rem; text-align: center;">

        <div
            style="width: 100px; height: 100px; border-radius: 50%; background-color: #e0e7ff; margin: 0 auto 1.5rem auto; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <img src="https://ui-avatars.com/api/?name={{ user['name'] }}&background=e0e7ff&color=4f46e5&size=100"
                alt="User" style="width: 100%;">
        </div>

        <h1 style="color: #333; margin: 0 0 0.5rem 0; font-size: 2rem;">{{ user['name'] }}</h1>
        <span class="badge" style="background-color: #ea70f1; color: white;">Verified SafeHer User</span>

        <div
            style="margin-top: 2.5rem; text-align: left; background: #fcfcfc; border: 1px solid #f0f0f0; border-radius: 12px; padding: 1.5rem;">
            <div style="display: flex; border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 1rem;">
                <div style="width: 40%; color: #888; font-weight: 500;">Email Address</div>
                <div style="width: 60%; color: #333; font-weight: 600;">{{ user['email'] }}</div>
            </div>
            <div style="display: flex; border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 1rem;">
                <div style="width: 40%; color: #888; font-weight: 500;">Phone Number</div>
                <div style="width: 60%; color: #333; font-weight: 600;">{{ user['phone'] }}</div>
            </div>
            <div style="display: flex;">
                <div style="width: 40%; color: #888; font-weight: 500;">Account ID</div>
                <div style="width: 60%; color: #333; font-weight: 600;">#{{ user['id'] }}</div>
            </div>
        </div>

        <a href="{{ url_for('logout') }}" class="btn"
            style="background: transparent; border: 2px solid #ff4d4f; color: #ff4d4f; padding: 0.8rem 2rem; border-radius: 30px; margin-top: 2rem; display: inline-block; text-decoration: none; font-weight: 600;">Logout
            Securely</a>

    </div>
</div>
{% endblock %}
