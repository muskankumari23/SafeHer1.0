<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - AI Powered Women Safety</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="active">Home</a>
            <a href="#">Partners</a>
            <a href="#">Safety Tips</a>
            <a href="#">Support</a>
        </div>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h2>SafeHer</h2>
        </div>
        <div class="user-profile" style="background: transparent; box-shadow: none;">
            <a href="{{ url_for('login') }}" class="btn" style="padding: 0.5rem 1.5rem;">Login</a>
        </div>
    </nav>

    <div class="dashboard-container"
        style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px);">
        <!-- Intro / Action Card -->
        <div class="card intro-card" style="max-width: 800px; text-align: center; align-items: center; padding: 4rem;">
            <span class="badge">Women Safety • Smart Monitoring</span>
            <h1 style="font-size: 4rem;">Your Safety,<br>Your Strength</h1>
            <p style="margin: 0 auto 2.5rem auto; font-size: 1.25rem;">AI-powered dynamic risk scoring, loud noise
                detection, falling tracking, and instant SOS alerts directly to your emergency contacts.</p>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="{{ url_for('signup') }}" class="btn btn-primary" style="text-decoration: none;">Get Started
                    Now</a>
                <a href="{{ url_for('login') }}" class="btn"
                    style="background-color: white; color: #b73a6a; border: 2px solid #f0f0f0; text-decoration: none; width: auto; padding: 0.8rem 2rem; border-radius: 30px;">Sign
                    In</a>
            </div>
        </div>
    </div>
</body>

</html>
