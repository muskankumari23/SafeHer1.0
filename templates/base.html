<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SafeHer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <!-- Universal Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="{% block nav_home %}{% endblock %}">Home</a>
            <a href="{{ url_for('dashboard') }}" class="{% block nav_dash %}{% endblock %}">Dashboard</a>
            <a href="{{ url_for('risk_analysis') }}" class="{% block nav_risk %}{% endblock %}">Risk Analysis</a>
            <a href="{{ url_for('safety_tips') }}" class="{% block nav_tips %}{% endblock %}">Tips</a>
            <a href="{{ url_for('helpline') }}" class="{% block nav_help %}{% endblock %}">Helplines</a>
        </div>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h2 style="margin:0;">SafeHer</h2>
        </div>
        <div class="user-profile" {% if not session.get('user_id') %}style="background: transparent; box-shadow: none;"
            {% endif %}>
            {% if session.get('user_id') %}
            <div class="avatar">
                <img src="https://ui-avatars.com/api/?name={{ session.get('name', 'User') }}&background=e0e7ff&color=4f46e5"
                    alt="User">
            </div>
            <span><a href="{{ url_for('profile') }}" style="color: inherit; text-decoration: none;">{{
                    session.get('name', 'Profile') }}</a></span>
            <a href="{{ url_for('logout') }}" class="dropdown-icon" title="Logout"
                style="text-decoration: none; font-size: 1rem;">🚪</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="btn"
                style="padding: 0.5rem 1.5rem; text-decoration: none;">Login</a>
            <a href="{{ url_for('signup') }}" class="btn"
                style="padding: 0.5rem 1.5rem; text-decoration: none; background: #fff; color: #d81b60; border: 1px solid #d81b60;">Register</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>

</html>
